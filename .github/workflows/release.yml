name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    name: Build Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Windows release binary
        run: cargo build --release --bin NeoSTS

      - name: Package Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/NeoSTS.exe -DestinationPath dist/NeoSTS-windows.zip

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/NeoSTS-windows.zip
          if-no-files-found: error

  macos:
    name: Build macOS Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build macOS app bundle
        run: bash scripts/bundle-macos-app.sh

      - name: Package macOS release
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent target/release/bundle/osx/NeoSTS.app dist/NeoSTS-macos.zip

      - name: Upload macOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: dist/NeoSTS-macos.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/NeoSTS-windows.zip
            dist/NeoSTS-macos.zip
